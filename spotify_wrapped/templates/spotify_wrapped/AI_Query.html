<!-- AI_Query.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Personality Through Music</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'spotify_wrapped/styles/AI_Query.css' %}">
    {% block stylesheet %}{% endblock %}
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <!-- Meta viewport for mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <div class="container">
        <h1>Your Personality Through Music</h1>
        <div class="timeline">
            <!-- Trait 1 -->
            <div class="timeline-item left">
                <div class="content">
                    <h2>Trait One</h2>
                    <p>Description of Trait One.</p>
                </div>
            </div>
            <!-- Trait 2 -->
            <div class="timeline-item right">
                <div class="content">
                    <h2>Trait Two</h2>
                    <p>Description of Trait Two.</p>
                </div>
            </div>
            <!-- Trait 3 -->
            <div class="timeline-item left">
                <div class="content">
                    <h2>Trait Three</h2>
                    <p>Description of Trait Three.</p>
                </div>
            </div>
            <!-- Trait 4 -->
            <div class="timeline-item right">
                <div class="content">
                    <h2>Trait Four</h2>
                    <p>Description of Trait Four.</p>
                </div>
            </div>
            <!-- Trait 5 -->
            <div class="timeline-item left">
                <div class="content">
                    <h2>Trait Five</h2>
                    <p>Description of Trait Five.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript for Animations -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const items = document.querySelectorAll('.timeline-item');

            const isInViewport = (el) => {
                const rect = el.getBoundingClientRect();
                return (
                    rect.top <= (window.innerHeight || document.documentElement.clientHeight) &&
                    rect.bottom >= 0
                );
            };

            const run = () => {
                items.forEach(item => {
                    if (isInViewport(item)) {
                        item.classList.add('in-view');
                    }
                });
            };

            // Initial check
            run();

            // Events
            window.addEventListener('scroll', run);
            window.addEventListener('resize', run);
        });
    </script>

</body>
</html>
