{% extends "spotify_wrapped/slides/base.html" %}

{% block title %}Spotify Wrapped{% endblock %}

{% block stylesheet %}
  {% load static %}
  <link rel="stylesheet" href="{% static 'spotify_wrapped/styles/slides/cover.css' %}">
{% endblock %}

{% block body %}
    <div class="wrapper">
        <div class="content">
            <h1 class="line1">hello <span id="username">[Username]</span></h1>
            <h2 class="line2">it's wrapped time.</h2>
            <h3 class="line3">are you ready?</h3>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const username = 'Patrick';  // Replace with dynamic username logic if needed
            document.getElementById("username").textContent = username;
        });
    </script>
{% endblock %}
