{% extends "spotify_wrapped/slides/base.html" %}

{% block body %}
    <div class="container">
        <h1>Recommended Songs for You</h1>
        <div class="songs-grid">
            {% for track in user_info.suggested_tracks|slice:":5" %}
            <div class="song-card">
                <div class="song-image">
		    {# <img src="{% static 'spotify_wrapped/images/song1.jpg' %}" alt="Song 1"> #}
                    <div class="play-button">
                        <i class="fas fa-play"></i>
                    </div>
                </div>
                <div class="song-info">
                    <div class="song-title">{{ track.song_name }}</div>
                    <div class="song-artist">{{ track.artists|join:", " }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Font Awesome for Play Button Icon -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
{% endblock %}
