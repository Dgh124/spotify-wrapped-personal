<!-- genres.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Top Genres</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'spotify_wrapped/styles/genres.css' %}">
  {% block stylesheet %}{% endblock %}
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <!-- Meta viewport for mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div class="container">
    <h1>Your Top Genres</h1>
    <div class="genres-list">
      <div class="genre-row genre1">
        <span class="genre-number">1</span>
        <span class="genre-name">Genre One</span>
      </div>
      <div class="genre-row genre2">
        <span class="genre-number">2</span>
        <span class="genre-name">Genre Two</span>
      </div>
      <div class="genre-row genre3">
        <span class="genre-number">3</span>
        <span class="genre-name">Genre Three</span>
      </div>
      <div class="genre-row genre4">
        <span class="genre-number">4</span>
        <span class="genre-name">Genre Four</span>
      </div>
      <div class="genre-row genre5">
        <span class="genre-number">5</span>
        <span class="genre-name">Genre Five</span>
      </div>
    </div>
  </div>

</body>
</html>
