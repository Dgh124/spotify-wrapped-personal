<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Top Artists</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'spotify_wrapped/styles/artists.css' %}">
  {% block stylesheet %}{% endblock %}
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <!-- Meta viewport for mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div class="container">
    <h1>Your Top 5 Artists</h1>
    <div class="artists-grid">
      <!-- Artist 1 -->
      <div class="artist-card">
        <div class="artist-image">
          <img src="{% static 'spotify_wrapped/images/artist1.jpg' %}" alt="Artist 1">
          <span class="artist-number">1</span>
        </div>
        <div class="artist-name">Artist One</div>
      </div>
      <!-- Artist 2 -->
      <div class="artist-card">
        <div class="artist-image">
          <img src="{% static 'spotify_wrapped/images/artist2.jpg' %}" alt="Artist 2">
          <span class="artist-number">2</span>
        </div>
        <div class="artist-name">Artist Two</div>
      </div>
      <!-- Artist 3 -->
      <div class="artist-card">
        <div class="artist-image">
          <img src="{% static 'spotify_wrapped/images/artist3.jpg' %}" alt="Artist 3">
          <span class="artist-number">3</span>
        </div>
        <div class="artist-name">Artist Three</div>
      </div>
      <!-- Artist 4 -->
      <div class="artist-card">
        <div class="artist-image">
          <img src="{% static 'spotify_wrapped/images/artist4.jpg' %}" alt="Artist 4">
          <span class="artist-number">4</span>
        </div>
        <div class="artist-name">Artist Four</div>
      </div>
      <!-- Artist 5 -->
      <div class="artist-card">
        <div class="artist-image">
          <img src="{% static 'spotify_wrapped/images/artist5.jpg' %}" alt="Artist 5">
          <span class="artist-number">5</span>
        </div>
        <div class="artist-name">Artist Five</div>
      </div>
    </div>
  </div>

</body>
</html>
